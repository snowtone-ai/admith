services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: admith
      POSTGRES_PASSWORD: admith
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admith"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://admith:admith@db:5432/admith
      REDIS_URL: redis://redis:6379/0
      ADMITH_RUNTIME: ${ADMITH_RUNTIME:-demo}
      ADMITH_REPOSITORY_MODE: ${ADMITH_REPOSITORY_MODE:-memory}
      ADMITH_ECONTRACT_ADAPTER_MODE: ${ADMITH_ECONTRACT_ADAPTER_MODE:-stub}
      ADMITH_MANIFEST_ADAPTER_MODE: ${ADMITH_MANIFEST_ADAPTER_MODE:-stub}
      API_KEY: ${API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
  dashboard:
    build: ./dashboard
    environment:
      API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
